; Limites upload pour php artisan serve (PHP built-in server)
; Ce fichier est lu automatiquement par PHP depuis le dossier public/.
; Pour Apache/Nginx, ajouter ces directives dans php.ini ou .htaccess.

upload_max_filesize = 20M
post_max_size       = 22M
memory_limit        = 256M
max_execution_time  = 60
